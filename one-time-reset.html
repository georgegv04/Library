<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>One-time password reset — My Library Corner</title>
    <link rel="stylesheet" href="auth.css" />
    <script src="one-time-reset.js" defer></script>
  </head>
  <body>
    <a class="brand" href="/">
      <span class="brand-mark"><img src="images/open-book1.svg" alt="" /></span>
      <span>My Library Corner</span>
    </a>

    <main>
      <section class="welcome" aria-labelledby="reset-welcome-title">
        <p class="eyebrow">Temporary account recovery</p>
        <h1 id="reset-welcome-title">Return to your personal library.</h1>
        <p>This private page works once and only for the production account configured by the owner.</p>
      </section>

      <section class="auth-card" aria-labelledby="reset-title">
        <form id="one-time-reset-form" autocomplete="off">
          <h2 id="reset-title">Set a new password</h2>
          <p id="form-intro">Enter the private reset key and choose your new password.</p>

          <label>
            Email address
            <input id="reset-email" name="email" type="email" autocomplete="off" maxlength="254" required />
          </label>
          <label>
            One-time reset key
            <input id="reset-token" name="reset-token" type="password" autocomplete="off" required />
          </label>
          <label>
            New password
            <input id="new-password" name="new-password" type="password" autocomplete="new-password" minlength="8" maxlength="128" required />
          </label>
          <label>
            Repeat new password
            <input id="repeat-password" name="repeat-password" type="password" autocomplete="new-password" minlength="8" maxlength="128" required />
          </label>

          <p class="form-message" role="alert" aria-live="polite"></p>
          <button class="submit-button" type="submit">Reset password <span>→</span></button>
        </form>
      </section>
    </main>
  </body>
</html>
