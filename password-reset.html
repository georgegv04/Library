<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password — My Library Corner</title>
    <link rel="stylesheet" href="auth.css" />
    <script src="password-reset.js?v=6" defer></script>
  </head>
  <body>
    <a class="brand" href="/">
      <span class="brand-mark"><img src="images/open-book1.svg" alt="" /></span>
      <span>My Library Corner</span>
    </a>
    <main>
      <section class="welcome" aria-labelledby="welcome-title">
        <p class="eyebrow">Your private reading room</p>
        <h1 id="welcome-title">Find your way back to your books.</h1>
        <p>A secure reset link lets you choose a new password for your library.</p>
      </section>
      <section class="auth-card" aria-labelledby="form-title">
        <form id="reset-form">
          <h2 id="form-title">Forgot your password?</h2>
          <p id="form-intro">Enter your account email to continue securely.</p>

          <label id="email-field">
            Email address
            <input id="reset-email" type="email" autocomplete="email" maxlength="254" required />
          </label>
          <label id="verification-code-field" hidden>
            Six-digit code
            <input id="verification-code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="456783" minlength="6" maxlength="6" pattern="[0-9]{6}" />
            <small>Check your email and enter the code we sent.</small>
          </label>
          <label id="new-password-field" hidden>
            New password
            <input id="new-password" type="password" autocomplete="new-password" minlength="8" maxlength="128" />
            <small>Use at least 8 characters.</small>
          </label>
          <label id="confirm-new-password-field" hidden>
            Confirm new password
            <input id="confirm-new-password" type="password" autocomplete="new-password" minlength="8" maxlength="128" />
          </label>

          <p class="form-message" role="alert" aria-live="polite"></p>
          <div class="reset-result" hidden></div>
          <button class="submit-button" type="submit">Send email code <span>→</span></button>
          <a class="back-link" href="/login">← Back to login</a>
        </form>
      </section>
    </main>
  </body>
</html>
