<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create or access your private My Library Corner account." />
    <title>Account — My Library Corner</title>
    <link rel="stylesheet" href="auth.css" />
    <script src="auth-client.js" defer></script>
  </head>
  <body>
    <a class="brand" href="/">
      <span class="brand-mark"><img src="images/open-book1.svg" alt="" /></span>
      <span>My Library Corner</span>
    </a>

    <main>
      <section class="welcome" aria-labelledby="welcome-title">
        <p class="eyebrow">Your private reading room</p>
        <h1 id="welcome-title">Every beloved book, waiting on your shelf.</h1>
        <p>Save your collection to your own account and find it wherever you return.</p>
      </section>

      <section class="auth-card" aria-labelledby="form-title">
        <div class="tabs" role="tablist" aria-label="Account action">
          <button id="signup-tab" type="button" role="tab">Create account</button>
          <button id="login-tab" type="button" role="tab">Log in</button>
        </div>

        <form id="auth-form" autocomplete="off">
          <h2 id="form-title">Create your account</h2>
          <p id="form-intro">Start a personal library that belongs only to you.</p>

          <label id="name-field">
            Your name
            <input id="name" name="name" type="text" autocomplete="off" maxlength="100" required />
          </label>
          <label>
            Email address
            <input id="email" name="email" type="email" autocomplete="off" maxlength="254" required />
          </label>
          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" maxlength="128" required />
            <small id="password-help">Use at least 8 characters.</small>
          </label>
          <label id="confirm-field">
            Confirm password
            <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" minlength="8" maxlength="128" required />
          </label>

          <p class="form-message" role="alert" aria-live="polite"></p>
          <button class="submit-button" type="submit">Create account <span>→</span></button>
        </form>
      </section>
    </main>
  </body>
</html>
