<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <div class="header-brand">
        <img
          class="library-header-icon"
          src="images/open-book.svg"
          alt="open-book"
        />
        <h1 class="page-title">My Library</h1>
      </div>
      <button class="add-new-book-btn">+ Add New Book</button>
    </header>
    <main>
      <div class="library-header">
        <img
          class="three-books-icon"
          src="images/three-books.svg"
          alt="3 books"
        />

        <h2 class="books-section-title">Your Books</h2>
      </div>

      <div class="library-container"></div>

      <div class="modal-overlay">
        <form class="book-form">
          <h2 class="form-title">Add New Book</h2>

          <div class="form-group">
            <label for="title">Book Title</label>
            <input
              type="text"
              id="title"
              name="title"
              placeholder="The Brothers Karamazov"
            />
          </div>
          <div class="form-group">
            <label for="author">Author</label>
            <input
              type="text"
              id="author"
              name="author"
              placeholder="Fyodor Dostoevsky"
            />
          </div>
          <div class="form-group">
            <label for="pages">Pages</label>
            <input type="number" id="pages" name="pages" placeholder="885" />
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="read-status" name="read-status" />
            <label for="read-status">I have read this book</label>
          </div>
          <div class="button-container">
            <button type="button" class="cancel-btn">Cancel</button>
            <button type="submit" class="submit-book-btn">Add Book</button>
          </div>
        </form>
      </div>

      <div class="library-message">
        <img class="bookshelf" src="images/shelf.png" alt="bookshelf" />
        <h3 class="library-message-title">Your library is empty!</h3>
        <p class="library-message-text">
          Add your first book to start building your collection.
        </p>
      </div>
    </main>
  </body>
</html>
