<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1 class="page-title">My Library</h1>
      <button class="add-book-btn">+ Add New Book</button>
    </header>
    <main>
      <div class="library-container"></div>
      <form class="book-form">
        <div class="form-group">
          <label for="title">Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="The Brothers Karamazov"
          />
        </div>
        <div class="form-group">
          <label for="author">Author</label>
          <input
            type="text"
            id="author"
            name="author"
            placeholder="Fyodor Dostoevsky"
          />
        </div>
        <div class="form-group">
          <label for="pages">Pages</label>
          <input type="number" id="pages" name="pages" placeholder="885" />
        </div>
        <div>
          <input type="checkbox" id="read-status" name="read-status" />
          <label for="read-status">I have read this book</label>
        </div>
      </form>
    </main>
  </body>
</html>
