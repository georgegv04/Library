<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>

    <link rel="stylesheet" href="style.css?v=16" />
    <script src="script.js?v=13" defer></script>
  </head>

  <body>
    <header>
      <div class="header-brand">
        <img
          class="library-header-icon"
          src="images/open-book1.svg"
          alt="Open book"
        />

        <h1 class="page-title">My Library</h1>
      </div>

      <div class="account-actions">
        <span class="account-name" aria-live="polite"></span>
        <button type="button" class="logout-btn">Log out</button>
        <button type="button" class="add-new-book-btn">+ Add New Book</button>
      </div>
    </header>

    <main>
      <div class="library-header">
        <img
          class="three-books-icon"
          src="images/three-books.svg"
          alt="Books"
        />

        <h2 class="books-section-title">Your Books</h2>
      </div>

      <div class="library-container"></div>

      <!-- Add Book Modal -->
      <div class="modal-overlay">
        <form class="book-form">
          <h2 class="form-title">Add New Book</h2>

          <div class="form-group">
            <label for="title">Book Title</label>

            <input
              type="text"
              id="title"
              name="title"
              placeholder="The Brothers Karamazov"
              required
            />
          </div>

          <div class="form-group">
            <label for="author">Author</label>

            <input
              type="text"
              id="author"
              name="author"
              placeholder="Fyodor Dostoevsky"
              required
            />
          </div>

          <div class="form-group">
            <label for="pages">Pages</label>

            <input
              type="number"
              id="pages"
              name="pages"
              placeholder="885"
              min="1"
              required
            />
          </div>

          <div class="form-group">
            <label for="cover-url">Custom Cover URL <span>(optional)</span></label>

            <input
              type="url"
              id="cover-url"
              name="cover-url"
              placeholder="Leave blank to find a cover automatically"
            />
          </div>

          <fieldset class="status-picker">
            <legend>Reading status</legend>
            <div class="status-options">
              <label class="status-option status-option-want">
                <input type="radio" name="read-status" value="Want to read" checked />
                <span class="status-option-mark">＋</span>
                <span><strong>Want to read</strong><small>Save it for later</small></span>
              </label>
              <label class="status-option status-option-reading">
                <input type="radio" name="read-status" value="Currently reading" />
                <span class="status-option-mark">◐</span>
                <span><strong>Currently reading</strong><small>In progress now</small></span>
              </label>
              <label class="status-option status-option-finished">
                <input type="radio" name="read-status" value="Finished" />
                <span class="status-option-mark">✓</span>
                <span><strong>Finished</strong><small>Completed reading</small></span>
              </label>
              <label class="status-option status-option-dnf">
                <input type="radio" name="read-status" value="Did not finish" />
                <span class="status-option-mark">×</span>
                <span><strong>Did not finish</strong><small>Stopped before the end</small></span>
              </label>
            </div>
          </fieldset>

          <div class="button-container">
            <button type="button" class="cancel-btn">Cancel</button>

            <button type="submit" class="submit-book-btn">Add Book</button>
          </div>
        </form>
      </div>

      <!-- Edit Book Modal -->
      <div class="edit-modal-overlay">
        <form class="edit-book-form">
          <div class="edit-form-header">
            <h2 class="form-title">Edit Book</h2>

            <button
              type="button"
              class="close-edit-btn"
              aria-label="Close edit form"
            >
              &times;
            </button>
          </div>

          <div class="form-group">
            <label for="edit-title">Book Title</label>

            <input type="text" id="edit-title" name="edit-title" required />
          </div>

          <div class="form-group">
            <label for="edit-author">Author</label>

            <input type="text" id="edit-author" name="edit-author" required />
          </div>

          <div class="form-group">
            <label for="edit-pages">Pages</label>

            <input
              type="number"
              id="edit-pages"
              name="edit-pages"
              min="1"
              required
            />
          </div>

          <div class="form-group">
            <label for="edit-date-added">Date Added</label>

            <input
              type="date"
              id="edit-date-added"
              name="edit-date-added"
              required
            />
          </div>

          <div class="form-group">
            <label for="edit-rating">Your Rating</label>

            <select id="edit-rating" name="edit-rating">
              <option value="0">Not rated</option>
              <option value="1">★ 1 star</option>
              <option value="2">★★ 2 stars</option>
              <option value="3">★★★ 3 stars</option>
              <option value="4">★★★★ 4 stars</option>
              <option value="5">★★★★★ 5 stars</option>
            </select>
          </div>

          <div class="form-group">
            <label for="edit-cover-url">
              Custom Cover URL <span>(optional)</span>
            </label>

            <input
              type="url"
              id="edit-cover-url"
              name="edit-cover-url"
              placeholder="Paste a cover URL to replace the current cover"
            />
          </div>

          <div class="form-group">
            <label for="edit-read-status">Reading status</label>
            <select id="edit-read-status" name="edit-read-status">
              <option value="Want to read">Want to read</option>
              <option value="Currently reading">Currently reading</option>
              <option value="Finished">Finished</option>
              <option value="Did not finish">Did not finish</option>
            </select>
          </div>

          <div class="button-container">
            <button type="button" class="cancel-edit-btn">Cancel</button>

            <button type="submit" class="save-edit-btn">Save Changes</button>
          </div>
        </form>
      </div>

      <!-- Book Details Modal -->
      <div class="details-modal-overlay">
        <article class="details-modal" aria-labelledby="details-title">
          <div class="details-modal-header">
            <p class="details-eyebrow">Book details</p>

            <button
              type="button"
              class="close-details-btn"
              aria-label="Close book details"
            >
              &times;
            </button>
          </div>

          <div class="details-content">
            <img class="details-cover" src="" alt="" />

            <div class="details-information">
              <h2 id="details-title" class="details-title"></h2>
              <p class="details-author"></p>

              <dl class="details-list">
                <div>
                  <dt>Pages</dt>
                  <dd class="details-pages"></dd>
                </div>

                <div>
                  <dt>Reading status</dt>
                  <dd class="details-status"></dd>
                </div>

                <div>
                  <dt>Date added</dt>
                  <dd class="details-date"></dd>
                </div>

                <div class="details-rating-item">
                  <dt>Your rating</dt>
                  <dd class="details-rating-display" aria-label="Not rated">
                    <span>★</span>
                    <span>★</span>
                    <span>★</span>
                    <span>★</span>
                    <span>★</span>
                  </dd>
                </div>
              </dl>
            </div>
          </div>

          <section class="details-description-section">
            <h3>About this book</h3>
            <p class="details-description"></p>
          </section>
        </article>
      </div>

      <!-- Quick Rating Modal -->
      <div class="rating-modal-overlay">
        <section class="rating-modal" aria-labelledby="rating-modal-title">
          <button
            type="button"
            class="close-rating-btn"
            aria-label="Close rating"
          >
            &times;
          </button>

          <p class="rating-modal-eyebrow">Your rating</p>
          <h2 id="rating-modal-title" class="rating-modal-title"></h2>
          <p class="rating-modal-help">Choose from 1 to 5 stars</p>

          <div class="quick-rating-control" aria-label="Choose book rating">
            <button type="button" data-rating="1" aria-label="1 star">★</button>
            <button type="button" data-rating="2" aria-label="2 stars">★</button>
            <button type="button" data-rating="3" aria-label="3 stars">★</button>
            <button type="button" data-rating="4" aria-label="4 stars">★</button>
            <button type="button" data-rating="5" aria-label="5 stars">★</button>
          </div>
        </section>
      </div>

      <div class="library-message">
        <img class="bookshelf" src="images/shelf.png" alt="Bookshelf" />

        <h3 class="library-message-title">Your library is empty!</h3>

        <p class="library-message-text">
          Add your first book to start building your collection.
        </p>
      </div>
    </main>
  </body>
</html>
